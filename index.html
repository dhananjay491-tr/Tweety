<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our 1st Anniversary - Pingu & Tweetu</title>
    <style>
        body {
            background-color: #DDA0DD; 
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            text-align: center;
        }

        .container {
            padding: 20px;
            z-index: 10;
            max-width: 100%;
            box-sizing: border-box;
        }

        h1 {
            color: #4b0082;
            font-size: 1.8rem;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.4);
            margin: 15px 0;
        }

        .tweety-img {
            width: 120px;
            height: auto;
            animation: characterBounce 1.5s infinite;
            margin-bottom: 20px;
        }

        /* --- Buttons --- */
        .primary-btn {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 18px 35px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
            transition: 0.3s;
        }
        .primary-btn:hover { transform: scale(1.05); background-color: #ff6b81; }

        /* --- Memory Vault (Preserved from original) --- */
        .memory-vault {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 20px 15px;
            margin: 20px 0;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
        }
        .memory-vault::-webkit-scrollbar { display: none; }

        .polaroid {
            background: white;
            padding: 10px 10px 25px 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            min-width: 160px;
            scroll-snap-align: center;
            transition: transform 0.3s ease;
        }
        .polaroid:nth-child(odd) { transform: rotate(-2deg); }
        .polaroid:nth-child(even) { transform: rotate(3deg); }
        .polaroid img { width: 160px; height: 160px; object-fit: cover; background: #f0f0f0; display: block; }
        .polaroid span { display: block; padding-top: 10px; font-family: 'Comic Sans MS', cursive; font-size: 0.85rem; color: #333; }

        /* --- Letter Reveal --- */
        .letter-container {
            margin: 30px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .envelope-btn {
            font-size: 80px;
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.3s ease;
            animation: pulse 2s infinite;
        }
        .envelope-btn:hover { transform: scale(1.2); }

        #letter-display {
            display: none;
            margin-top: 20px;
            max-width: 90%;
            border: 8px solid white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: fadeIn 1s ease-in;
        }

        /* --- Animations --- */
        @keyframes characterBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .petal { position: fixed; top: -10%; z-index: 5; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) translateX(80px) rotate(360deg); } }

        /* --- Page Toggling --- */
        #page-2 { display: none; }
    </style>
</head>
<body>

    <div id="page-1" class="container">
        <img src="tweety.png" alt="Tweety" class="tweety-img">
        <h1>Happy 1st Anniversary, Tweetu! 🐣❤️</h1>
        <p style="color: #4b0082; font-weight: bold;">One year of us, and forever to go.</p>
        <br>
        <button class="primary-btn" onclick="goToSecondPage()">hug me to seek through my heart 🤗</button>
    </div>

    <div id="page-2" class="container">
        <h1>Our Beautiful Year Together ✨</h1>
        
        <div class="memory-vault">
            <div class="polaroid"> <img src="IMG_20260213_153055.jpg" alt="1"> <span>The Start ✨</span> </div>
            <div class="polaroid"> <img src="IMG20250824114211.jpg" alt="2"> <span>That Smile! 😍</span> </div>
            <div class="polaroid"> <img src="IMG20250926162437.jpg" alt="3"> <span>Favorite Day 🍕</span> </div>
            <div class="polaroid"> <img src="IMG_20260213_153258.jpg" alt="4"> <span>Togetherness ❤️</span> </div>
            <div class="polaroid"> <img src="IMG_20251125_013640.jpg" alt="5"> <span>Special Moments 🌸</span> </div>
            <div class="polaroid"> <img src="IMG-20251126-WA0006.jpg" alt="6"> <span>Sweetest Memory 🍬</span> </div>
            <div class="polaroid"> <img src="IMG20251207151640.jpg" alt="7"> <span>Our Vibe ✨</span> </div>
            <div class="polaroid"> <img src="IMG20251223152546.jpg" alt="8"> <span>Just Us. 👫</span> </div>
            <div class="polaroid"> <img src="IMG_20260213_185802.jpg" alt="9"> <span>Pingu & Tweetu 🐧</span> </div>
            <div class="polaroid"> <img src="IMG20260125201150.jpg" alt="10"> <span>Forever! ♾️</span> </div>
        </div>

        <div class="letter-container">
            <h3 style="color: #4b0082;">You have a message...</h3>
            <button id="letter-btn" class="envelope-btn" onclick="revealLetter()">✉️</button>
            
            <img id="letter-display" src="IMG_20260501_183817217_HDR~2.jpg" alt="Anniversary Letter">
        </div>

        <audio id="anniversary-music">
            <source src="KeuJaneNa.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        function goToSecondPage() {
            document.getElementById('page-1').style.display = 'none';
            document.getElementById('page-2').style.display = 'block';
            startPetals(['❤️', '✨', '💖', '💍']);
        }

        function revealLetter() {
            // Play Music
            const audio = document.getElementById('anniversary-music');
            audio.play().catch(e => console.log("Music interaction required"));

            // Show Letter
            const letter = document.getElementById('letter-display');
            letter.style.display = 'block';

            // Change Envelope to Open
            document.getElementById('letter-btn').innerText = '📂';
            document.getElementById('letter-btn').style.animation = 'none';
            
            // Extra Celebration
            startPetals(['🌸', '🎊', '✨', '❤️']);
        }

        function startPetals(items) {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const petal = document.createElement('div');
                    petal.className = 'petal';
                    petal.innerText = items[Math.floor(Math.random() * items.length)];
                    petal.style.left = Math.random() * 100 + 'vw';
                    petal.style.fontSize = (Math.random() * 25 + 15) + 'px';
                    petal.style.animationDuration = (Math.random() * 3 + 3) + 's';
                    document.body.appendChild(petal);
                    setTimeout(() => { petal.remove(); }, 6000);
                }, i * 200);
            }
        }
    </script>
</body>
</html>
